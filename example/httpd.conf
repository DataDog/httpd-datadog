# Apache httpd v2.4 minimal configuration
# This can be reduced further if you remove the accees log and mod_log_config
# ServerRoot "/usr/local/apache2"

Listen 8080

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule datadog_module /Users/damien.mehala/workspace/httpd-datadog-rum/build/mod_datadog/mod_datadog.so

TypesConfig conf/mime.types

PidFile logs/httpd.pid

# In a basic setup httpd can only serve files from its document root
DocumentRoot "/Users/damien.mehala/workspace/httpd-datadog-rum/example/htdoc"

# Default file to serve
DirectoryIndex index.html

# Errors go to their own log
LogLevel warn
LogFormat "%h %l %u %t \"%r\" %>s %b" common

DatadogRumEnable On
DatadogTracingEnable Off
DatadogRumIncludeConfiguration "/Users/damien.mehala/workspace/httpd-datadog-rum/example/rum_conf.json"
